name: Feature request
description: Suggest an improvement for the template.
title: "Feature: "
labels:
  - enhancement
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What template user problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - Astro app
        - Supabase auth
        - Middleware or routing
        - AWS deployment
        - Terraform
        - GitHub Actions
        - Documentation
        - Developer experience
        - Other
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives
      description: Any alternatives or tradeoffs?
    validations:
      required: false
