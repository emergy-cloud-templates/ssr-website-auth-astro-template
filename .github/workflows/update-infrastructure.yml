# -----------------------------------------------------------------------------
# emergy.cloud CI/CD reference - Update Infrastructure (Astro)
#
# Applies the repository's terraform (infrastructure/) against the project's
# AWS account: website buckets, CloudFront distributions, and - for SSR
# templates - the Lambda that serves rendered pages. Runs on pushes to main
# that touch infrastructure/, or manually. The same file works for every
# Astro template - SSR build steps are detected at runtime.
#
# Repository variables maintained by the emergy platform:
#   PROJECT_ID, AWS_REGION, AWS_ACCOUNT_ID, AWS_INFRA_ROLE_TO_ASSUME,
#   TF_BACKEND_BUCKET, TF_STATE_KEY_PREFIX, ENVS,
#   AWS_WEBSITE_ACM_ARN / AWS_WEBSITE_ACM_NAME (when a certificate exists)
# Optional overrides you may set yourself:
#   NODE_VERSION (default 24), TF_VERSION, TF_DDB_TABLE, INFRA_DIR
#
# GitHub Deployments: one deployment per enabled environment (ENVS) is
# created, marked in progress, then resolved to success/failure with the
# environment URL read from the terraform output named <environment>_cdn_url.
# The emergy platform reads these deployments to surface environment URLs.
#
# CONTRACT - do not rename this file
# (.github/workflows/update-infrastructure.yml); the emergy platform matches
# infrastructure runs by that path.
# -----------------------------------------------------------------------------
name: Update Infrastructure

on:
  workflow_dispatch: {}
  push:
    branches: [ main ]
    paths: [ "infrastructure/**" ]

jobs:
  update:
    # Skip the very first push (the commit that creates the repo from the
    # template) - the AWS account is not provisioned yet at that point.
    if: ${{ !(github.event_name == 'push' && github.run_number == 1) }}

    runs-on: ubuntu-latest

    env:
      INFRA_DIR: ${{ vars.INFRA_DIR || 'infrastructure' }}
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      TF_VERSION: ${{ vars.TF_VERSION || '1.7.5' }}
      TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
      TF_DDB_TABLE: ${{ vars.TF_DDB_TABLE || 'terraform-state-lock' }}
      TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX || 'default-project' }}
      ROLE_TO_ASSUME: ${{ vars.AWS_INFRA_ROLE_TO_ASSUME }}
      NODE_VERSION: ${{ vars.NODE_VERSION || '24' }}

      # Enabled environments - maintained by the platform
      ENVS: ${{ vars.ENVS || 'dev,prod' }}

      # Pass-thru TF vars the terraform root uses
      TF_VAR_aws_account_number: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_project_id: ${{ vars.PROJECT_ID }}
      TF_VAR_base_domain: ${{ vars.AWS_WEBSITE_ACM_NAME }}
      TF_VAR_aws_website_acm_arn: ${{ vars.AWS_WEBSITE_ACM_ARN }}

    permissions:
      id-token: write
      contents: read
      deployments: write

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.INFRA_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v6
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v4
        with:
          terraform_version: ${{ env.TF_VERSION }}

      # SSR templates (a "prepare:aws" script in website/package.json) need a
      # server bundle and a Lambda layer for terraform to package.
      - name: Detect project shape
        id: shape
        working-directory: .
        run: |
          set -euo pipefail
          PM=npm; LOCKFILE=package-lock.json
          if [ -f website/pnpm-lock.yaml ]; then PM=pnpm; LOCKFILE=pnpm-lock.yaml; fi
          SSR=false
          if jq -e '.scripts["prepare:aws"]' website/package.json >/dev/null 2>&1; then SSR=true; fi
          # pnpm/action-setup reads the pnpm version from the "packageManager"
          # field; repos without the field get an explicit fallback instead of
          # a "No pnpm version is specified" failure.
          PNPM_VERSION=''
          if [ "$PM" = pnpm ] && ! jq -e '.packageManager? | strings | startswith("pnpm@")' website/package.json >/dev/null 2>&1; then
            PNPM_VERSION=10
            echo "No pnpm \"packageManager\" entry in package.json - defaulting to pnpm ${PNPM_VERSION}"
          fi
          echo "Detected: pm=$PM ssr=$SSR"
          { echo "pm=$PM"; echo "lockfile=$LOCKFILE"; echo "ssr=$SSR"; echo "pnpm_version=$PNPM_VERSION"; } >> "$GITHUB_OUTPUT"

      # pnpm version comes from the "packageManager" field in package.json;
      # the shape step supplies a fallback when the field is absent (an empty
      # version input means "read packageManager").
      - name: Setup pnpm
        if: steps.shape.outputs.ssr == 'true' && steps.shape.outputs.pm == 'pnpm'
        uses: pnpm/action-setup@v6
        with:
          version: ${{ steps.shape.outputs.pnpm_version }}

      - name: Setup Node
        if: steps.shape.outputs.ssr == 'true'
        uses: actions/setup-node@v7
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: ${{ steps.shape.outputs.pm }}
          cache-dependency-path: website/${{ steps.shape.outputs.lockfile }}

      - name: Terraform Init (S3 backend with DynamoDB lock)
        run: |
          set -euo pipefail
          rm -rf .terraform
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_DDB_TABLE}"

      - name: Build Lambda layer (SSR runtime dependencies)
        if: steps.shape.outputs.ssr == 'true'
        run: |
          set -euo pipefail
          cd lambda_layer/nodejs
          npm init -y
          npm install @aws-sdk/client-lambda @aws-sdk/client-s3 axios fs lodash node-gzip

          cd ..
          zip -r lambda_layer_website_ssr.zip nodejs

      - name: Build SSR server bundle
        if: steps.shape.outputs.ssr == 'true'
        working-directory: website
        run: |
          set -euo pipefail
          if [ "${{ steps.shape.outputs.pm }}" = "pnpm" ]; then
            pnpm install --frozen-lockfile
          else
            npm ci
          fi
          "${{ steps.shape.outputs.pm }}" run build
          "${{ steps.shape.outputs.pm }}" run prepare:aws

      # One GitHub Deployment per enabled environment, all marked in progress
      # while terraform runs. The id map travels to the status steps below.
      - name: Create GitHub Deployments (in progress)
        id: deployments
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          IDS='{}'
          IFS=',' read -ra ENV_LIST <<< "${ENVS}"
          for E in "${ENV_LIST[@]}"; do
            body=$(jq -n --arg ref "${{ github.sha }}" --arg env "$E" '
              { ref: $ref, auto_merge: false, environment: $env, required_contexts: [] }')
            resp=$(echo "$body" | gh api -X POST \
              -H "Accept: application/vnd.github+json" \
              -H "Content-Type: application/json" \
              repos/${{ github.repository }}/deployments --input -)
            ID=$(echo "$resp" | jq -r .id)
            gh api -X POST -H "Accept: application/vnd.github+json" \
              repos/${{ github.repository }}/deployments/$ID/statuses \
              -f state="in_progress" \
              -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
            IDS=$(echo "$IDS" | jq -c --arg env "$E" --argjson id "$ID" '. + {($env): $id}')
          done
          echo "ids=$IDS" >> "$GITHUB_OUTPUT"

      # The terraform root manages every enabled environment in one state -
      # a single apply updates them all.
      - name: Terraform Apply
        run: terraform apply -auto-approve

      # Resolve each deployment with its URL (terraform output
      # <environment>_cdn_url). The emergy platform reads the environment_url.
      - name: Mark Deployments success
        if: ${{ success() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          IDS='${{ steps.deployments.outputs.ids }}'
          [ -n "$IDS" ] || IDS='{}'
          IFS=',' read -ra ENV_LIST <<< "${ENVS}"
          for E in "${ENV_LIST[@]}"; do
            ID=$(echo "$IDS" | jq -r --arg env "$E" '.[$env] // empty')
            [ -n "$ID" ] || continue
            URL=$(terraform output -raw "${E}_cdn_url" 2>/dev/null || true)
            args=(-f state="success")
            if [ -n "$URL" ]; then args+=(-f environment_url="$URL"); fi
            args+=(-f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}")
            gh api -X POST -H "Accept: application/vnd.github+json" \
              repos/${{ github.repository }}/deployments/$ID/statuses "${args[@]}"
          done

      - name: Mark Deployments failure
        if: ${{ failure() }}
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          # Empty when the run failed before the deployments step.
          IDS='${{ steps.deployments.outputs.ids }}'
          [ -n "$IDS" ] || IDS='{}'
          IFS=',' read -ra ENV_LIST <<< "${ENVS}"
          for E in "${ENV_LIST[@]}"; do
            ID=$(echo "$IDS" | jq -r --arg env "$E" '.[$env] // empty')
            [ -n "$ID" ] || continue
            gh api -X POST -H "Accept: application/vnd.github+json" \
              repos/${{ github.repository }}/deployments/$ID/statuses \
              -f state="failure" \
              -f description="Terraform apply failed" \
              -f log_url="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          done
