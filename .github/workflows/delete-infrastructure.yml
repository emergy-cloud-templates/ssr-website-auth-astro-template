name: Delete Infrastructure

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'confirm' to proceed with terraform destroy"
        required: true
        type: string
        default: ""

jobs:
  delete:
    # Only run if the user typed exactly 'confirm'
    if: ${{ github.event.inputs.confirm == 'confirm' }}

    runs-on: ubuntu-latest

    env:
      INFRA_DIR: 'infrastructure'
      AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
      AWS_ACCOUNT_ID: ${{ vars.AWS_ACCOUNT_ID }}
      PROJECT_ID: ${{ vars.PROJECT_ID }}
      TF_VERSION: ${{ vars.TF_VERSION || '1.7.5' }}
      TF_BACKEND_BUCKET: ${{ vars.TF_BACKEND_BUCKET }}
      TF_DDB_TABLE: ${{ vars.TF_DDB_TABLE || 'terraform-state-lock' }}
      TF_STATE_KEY_PREFIX: ${{ vars.TF_STATE_KEY_PREFIX || 'default-project' }}
      ROLE_TO_ASSUME: ${{ vars.AWS_INFRA_ROLE_TO_ASSUME }}

      # Pass-thru TF vars your root uses
      TF_VAR_aws_account_number: ${{ vars.AWS_ACCOUNT_ID }}
      TF_VAR_project_id: ${{ vars.PROJECT_ID }}
      TF_VAR_base_domain: ${{ vars.AWS_WEBSITE_ACM_NAME }}
      TF_VAR_aws_website_acm_arn: ${{ vars.AWS_WEBSITE_ACM_ARN }}

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        shell: bash
        working-directory: ${{ env.INFRA_DIR }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ env.ROLE_TO_ASSUME }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Show confirmation
        run: |
          echo "Confirmation provided: '${{ github.event.inputs.confirm }}'"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ env.TF_VERSION }}

      - name: Terraform Init (S3 backend with DynamoDB lock)
        run: |
          set -euo pipefail
          
          echo "delete" > delete.txt
          zip -j lambda_layer/lambda_layer_website_ssr.zip delete.txt
          rm -rf .terraform
          terraform init \
            -backend-config="bucket=${TF_BACKEND_BUCKET}" \
            -backend-config="key=${TF_STATE_KEY_PREFIX}/terraform.tfstate" \
            -backend-config="region=${AWS_REGION}" \
            -backend-config="dynamodb_table=${TF_DDB_TABLE}"

      - name: Terraform Destroy
        run: terraform destroy -auto-approve
